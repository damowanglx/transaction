services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.8-alpine
    container_name: quant_clickhouse
    ports:
      - "8123:8123"   # HTTP interface
      - "9000:9000"   # Native TCP interface
      - "9009:9009"   # Inter-server
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./scripts/init_clickhouse.sql:/docker-entrypoint-initdb.d/init_clickhouse.sql
    environment:
      CLICKHOUSE_DB: quant
      CLICKHOUSE_USER: quant
      CLICKHOUSE_PASSWORD: quant123
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: quant_postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_postgres.sql:/docker-entrypoint-initdb.d/init_postgres.sql
    environment:
      POSTGRES_DB: quant
      POSTGRES_USER: quant
      POSTGRES_PASSWORD: quant123
    restart: unless-stopped

volumes:
  clickhouse_data:
  postgres_data:
